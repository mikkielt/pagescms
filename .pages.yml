media:
  - name: portfolio
    label: Zdjęcia portfolio
    input: media/portfolio
    output: /media/portfolio
    categories: [image]
  - name: general
    label: Media ogólne
    input: media
    output: /media
    categories: [image, document]

components:
  seo:
    type: object
    label: SEO
    fields:
      - name: meta_title
        label: Tytuł meta
        type: string
        description: Nadpisuje tytuł strony w wynikach wyszukiwania.
      - name: meta_description
        label: Opis meta
        type: text
        description: Krótkie podsumowanie wyświetlane w wynikach wyszukiwania.
      - name: og_image
        label: Obrazek udostępniania
        type: image

content:
  - name: settings
    label: Ustawienia strony
    type: file
    path: _data/settings.json
    format: json
    fields:
      - name: title
        label: Tytuł strony
        type: string
        required: true
      - name: description
        label: Opis strony
        type: text
      - name: logo
        label: Logo
        type: image
      - name: footer_text
        label: Tekst stopki
        type: string
        description: Wyświetlany na dole każdej strony.

  - name: pages
    label: Strony
    type: group
    items:
      - name: portfolio
        label: Portfolio
        type: file
        path: _data/portfolio.json
        format: json
        list:
          min: 1
          collapsible:
            collapsed: true
            summary: "{title}"
        fields:
          - name: title
            label: Nazwa projektu
            type: string
            required: true
          - name: short_description
            label: Krótki opis
            type: string
            description: Jednoliniowy opis wyświetlany na karcie portfolio.
          - name: long_description
            label: Pełny opis
            type: text
            description: Wyświetlany po rozwinięciu panelu opisu.
          - name: featured_image
            label: Zdjęcie główne
            type: image
            required: true
            description: Główne zdjęcie projektu wyświetlane na pełnym ekranie.
          - name: images
            label: Galeria zdjęć
            type: image
            list:
              max: 20
            description: Dodatkowe zdjęcia wyświetlane jako miniatury.

      - name: about
        label: O nas
        type: file
        path: _data/about.json
        format: json
        fields:
          - name: heading
            label: Nagłówek sekcji
            type: string
            required: true
          - name: story
            label: Nasza historia
            type: rich-text
            description: Główna opowieść o firmie.
          - name: mission
            label: Misja firmy
            type: text
          - name: background_image
            label: Zdjęcie w tle
            type: image
            description: Opcjonalne zdjęcie warsztatu, zespołu lub rzemiosła.
          - name: seo
            component: seo

      - name: contact
        label: Kontakt
        type: file
        path: _data/contact.json
        format: json
        fields:
          - name: heading
            label: Nagłówek sekcji
            type: string
            required: true
          - name: description
            label: Opis
            type: text
          - name: email
            label: Email
            type: string
          - name: phone
            label: Telefon
            type: string
          - name: address
            label: Adres
            type: text
          - name: social
            label: Linki społecznościowe
            type: object
            list:
              max: 8
              collapsible:
                collapsed: true
                summary: "{platform}"
            fields:
              - name: platform
                label: Nazwa platformy
                type: string
                required: true
              - name: url
                label: Adres URL profilu
                type: string
                required: true
          - name: seo
            component: seo

settings:
  content:
    merge: true
  commit:
    templates:
      create: "content: add {filename}"
      update: "content: update {filename}"
      delete: "content: remove {filename}"

actions:
  - name: deploy-site
    label: Publikuj stronę
    workflow: deploy.yml
    confirm:
      title: Publikować stronę?
      message: Strona zostanie przebudowana i opublikowana.
      button: Publikuj
