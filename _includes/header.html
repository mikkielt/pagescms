<header class="site-header" id="site-header">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="site-logo">
      {% if site.data.settings.logo and site.data.settings.logo != "" %}
        <img src="{{ site.data.settings.logo }}" alt="{{ site.data.settings.title }}">
      {% else %}
        <span>{{ site.data.settings.title | default: site.title }}</span>
      {% endif %}
    </a>
    <nav class="site-nav">
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="#portfolio">Portfolio</a></li>
        <li><a href="#about">O nas</a></li>
        <li><a href="#contact">Kontakt</a></li>
      </ul>
    </nav>
  </div>
</header>
