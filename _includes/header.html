<header class="site-header" id="site-header">
  <a href="#oferta" class="skip-to-content">Przejdź do treści</a>
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="site-logo">
      {% if site.data.settings.logo and site.data.settings.logo != "" %}
        <img src="{{ site.data.settings.logo }}" alt="{{ site.data.settings.title }}">
      {% else %}
        <span>{{ site.data.settings.title | default: site.title }}</span>
      {% endif %}
    </a>
    <nav class="site-nav">
      <button class="nav-toggle" aria-label="Przełącz nawigację" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li class="nav-dropdown">
          <button class="nav-dropdown__trigger" aria-expanded="false" aria-haspopup="true">Portfolio</button>
          <ul class="nav-dropdown__menu" role="menu">
            {% for project in site.data.portfolio %}
              <li role="none"><a role="menuitem" href="#portfolio" onclick="navigateToSlide({{ forloop.index0 }})">{{ project.title }}</a></li>
            {% endfor %}
          </ul>
        </li>
        <li><a href="#oferta">Oferta</a></li>
        <li><a href="#about">O nas</a></li>
        <li><a href="#contact">Kontakt</a></li>
      </ul>
    </nav>
  </div>
</header>
