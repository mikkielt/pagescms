<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.seo_title %}{{ page.seo_title }}{% else %}{{ page.title }} | {{ site.data.settings.title | default: site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.seo_description | default: site.data.settings.description | default: '' }}">
  {% if page.og_image %}<meta property="og:image" content="{{ page.og_image }}">{% endif %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  {% include header.html %}
  <main>
    {{ content }}
  </main>
  {% include footer.html %}
  <script>
    /* ── Header: transparent → solid on scroll ── */
    (function() {
      var header = document.getElementById('site-header');
      if (!header) return;

      function updateHeader() {
        if (window.scrollY > 80) {
          header.classList.add('header-solid');
        } else {
          header.classList.remove('header-solid');
        }
      }
      window.addEventListener('scroll', updateHeader, { passive: true });
      updateHeader();

      /* Mobile nav toggle */
      var toggle = header.querySelector('.nav-toggle');
      if (toggle) {
        toggle.addEventListener('click', function() {
          var expanded = this.getAttribute('aria-expanded') === 'true';
          this.setAttribute('aria-expanded', !expanded);
          header.querySelector('.nav-links').classList.toggle('open');
        });
      }

      /* Close mobile nav on link click */
      header.querySelectorAll('.nav-links a').forEach(function(link) {
        link.addEventListener('click', function() {
          header.querySelector('.nav-links').classList.remove('open');
          if (toggle) toggle.setAttribute('aria-expanded', 'false');
        });
      });
    })();

    /* ── Portfolio carousel navigation ── */
    var track = document.getElementById('portfolio-track');

    function getCurrentSlideIndex() {
      if (!track) return 0;
      var slideWidth = track.firstElementChild ? track.firstElementChild.offsetWidth : 1;
      return Math.round(track.scrollLeft / slideWidth);
    }

    function navigateSlide(dir) {
      if (!track) return;
      var slides = track.querySelectorAll('.portfolio-slide');
      var current = getCurrentSlideIndex();
      var next = current + dir;
      if (next < 0) next = slides.length - 1;
      if (next >= slides.length) next = 0;
      slides[next].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
    }

    function updateCounter() {
      var el = document.getElementById('counter-current');
      if (el) el.textContent = getCurrentSlideIndex() + 1;
    }

    if (track) {
      track.addEventListener('scroll', function() {
        requestAnimationFrame(updateCounter);
      }, { passive: true });
    }

    /* ── Description expand/collapse ── */
    function toggleInfo(index) {
      var info = document.getElementById('info-' + index);
      if (!info) return;
      info.classList.toggle('expanded');
      var icon = info.querySelector('.portfolio-info__expand-icon');
      if (icon) icon.textContent = info.classList.contains('expanded') ? '▾' : '▸';
    }

    /* ── Lightbox ── */
    function openLightbox(src, thumbEl) {
      var lb = document.getElementById('lightbox');
      var img = document.getElementById('lightbox-img');
      if (!lb || !img) return;
      img.src = src;
      lb.classList.add('active');
      document.body.style.overflow = 'hidden';

      /* Update active thumb styling */
      if (thumbEl) {
        var parent = thumbEl.closest('.portfolio-thumbs');
        if (parent) {
          parent.querySelectorAll('.portfolio-thumb').forEach(function(t) {
            t.classList.remove('active');
          });
          thumbEl.classList.add('active');
        }
      }
    }

    function closeLightbox(e) {
      if (e && e.target !== e.currentTarget && !e.target.classList.contains('lightbox__close')) return;
      var lb = document.getElementById('lightbox');
      if (lb) {
        lb.classList.remove('active');
        document.body.style.overflow = '';
      }
    }

    /* ── Keyboard navigation ── */
    document.addEventListener('keydown', function(e) {
      var lb = document.getElementById('lightbox');

      /* Escape closes lightbox */
      if (e.key === 'Escape' && lb && lb.classList.contains('active')) {
        closeLightbox({ target: lb, currentTarget: lb });
        return;
      }

      /* Arrow keys navigate portfolio (only when lightbox is closed) */
      if (lb && lb.classList.contains('active')) return;
      if (e.key === 'ArrowRight') navigateSlide(1);
      if (e.key === 'ArrowLeft') navigateSlide(-1);
    });

    /* ── Smooth scroll for anchor links ── */
    document.querySelectorAll('a[href^="#"]').forEach(function(anchor) {
      anchor.addEventListener('click', function(e) {
        var target = document.querySelector(this.getAttribute('href'));
        if (target) {
          e.preventDefault();
          target.scrollIntoView({ behavior: 'smooth' });
        }
      });
    });
  </script>
</body>
</html>
