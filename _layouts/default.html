<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}

  <!-- LocalBusiness structured data -->
  {% assign ld_contact = site.data.contact %}
  {% assign ld_settings = site.data.settings %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": {{ ld_settings.title | default: site.title | jsonify }},
    "description": {{ ld_settings.description | default: site.description | jsonify }},
    "url": "{{ site.url }}{{ site.baseurl }}/",
    {% if ld_contact.email and ld_contact.email != "" %}"email": {{ ld_contact.email | jsonify }},{% endif %}
    {% if ld_contact.phone and ld_contact.phone != "" %}"telephone": {{ ld_contact.phone | jsonify }},{% endif %}
    {% if ld_contact.address and ld_contact.address != "" %}
    "address": {
      "@type": "PostalAddress",
      "addressLocality": {{ ld_contact.address | jsonify }}
    },
    {% endif %}
    "image": "{{ site.url }}{{ site.baseurl }}/media/portfolio/{{ site.data.portfolio[0].images[0] | split: '/' | last }}"
  }
  </script>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  {% include header.html %}
  <main>
    {{ content }}
  </main>
  {% include footer.html %}
  <script>
    /* ── Header: transparent → solid on scroll ── */
    (function() {
      var header = document.getElementById('site-header');
      if (!header) return;

      function updateHeader() {
        if (window.scrollY > 80) {
          header.classList.add('header-solid');
        } else {
          header.classList.remove('header-solid');
        }
      }
      window.addEventListener('scroll', updateHeader, { passive: true });
      updateHeader();

      /* Mobile nav toggle */
      var toggle = header.querySelector('.nav-toggle');
      if (toggle) {
        toggle.addEventListener('click', function() {
          var expanded = this.getAttribute('aria-expanded') === 'true';
          this.setAttribute('aria-expanded', !expanded);
          header.querySelector('.nav-links').classList.toggle('open');
        });
      }

      /* Close mobile nav on link click */
      header.querySelectorAll('.nav-links a').forEach(function(link) {
        link.addEventListener('click', function() {
          header.querySelector('.nav-links').classList.remove('open');
          if (toggle) toggle.setAttribute('aria-expanded', 'false');
        });
      });

    })();

    /* ── Portfolio carousel navigation ── */
    var track = document.getElementById('portfolio-track');
    var autoTimer = null;
    var idleTimer = null;
    var AUTO_INTERVAL = 7000;
    var IDLE_RESUME = 10000;
    var autoPaused = false;

    function getCurrentSlideIndex() {
      if (!track) return 0;
      var slideWidth = track.firstElementChild ? track.firstElementChild.offsetWidth : 1;
      return Math.round(track.scrollLeft / slideWidth);
    }

    function navigateSlide(dir) {
      if (!track) return;
      var slides = track.querySelectorAll('.portfolio-slide');
      var current = getCurrentSlideIndex();
      var next = current + dir;
      if (next < 0) next = slides.length - 1;
      if (next >= slides.length) next = 0;
      track.scrollTo({ left: next * slides[0].offsetWidth, behavior: 'smooth' });
      pauseAuto();
    }

    function navigateToSlide(index) {
      if (!track) return;
      var slides = track.querySelectorAll('.portfolio-slide');
      if (index >= 0 && index < slides.length) {
        track.scrollTo({ left: index * slides[0].offsetWidth, behavior: 'smooth' });
      }
      pauseAuto();
    }

    /* Auto-carousel */
    function isPortfolioVisible() {
      var section = document.getElementById('portfolio');
      if (!section) return false;
      var rect = section.getBoundingClientRect();
      return rect.bottom > 0 && rect.top < window.innerHeight;
    }

    function startAuto() {
      stopAuto();
      autoPaused = false;
      autoTimer = setInterval(function() {
        if (!track || !isPortfolioVisible()) return;
        var slides = track.querySelectorAll('.portfolio-slide');
        var current = getCurrentSlideIndex();
        var next = (current + 1) % slides.length;
        track.scrollTo({ left: next * slides[0].offsetWidth, behavior: 'smooth' });
      }, AUTO_INTERVAL);
    }

    function stopAuto() {
      if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
    }

    function pauseAuto() {
      stopAuto();
      autoPaused = true;
      /* Schedule resume after idle */
      if (idleTimer) clearTimeout(idleTimer);
      idleTimer = setTimeout(function() {
        startAuto();
      }, IDLE_RESUME);
    }

    if (track) {
      /* Touch/swipe edge wrapping */
      var touchStartX = 0;
      var touchStartScroll = 0;
      track.addEventListener('touchstart', function(e) {
        touchStartX = e.touches[0].clientX;
        touchStartScroll = track.scrollLeft;
        pauseAuto();
      }, { passive: true });

      track.addEventListener('touchend', function(e) {
        var dx = e.changedTouches[0].clientX - touchStartX;
        var slides = track.querySelectorAll('.portfolio-slide');
        var current = getCurrentSlideIndex();
        var threshold = 50;
        /* Swiped left (next) at last slide */
        if (dx < -threshold && current === slides.length - 1 && track.scrollLeft >= touchStartScroll) {
          track.scrollTo({ left: 0, behavior: 'smooth' });
        }
        /* Swiped right (prev) at first slide */
        if (dx > threshold && current === 0 && track.scrollLeft <= 0) {
          track.scrollTo({ left: (slides.length - 1) * slides[0].offsetWidth, behavior: 'smooth' });
        }
      }, { passive: true });

      /* Pause on hover */
      var portfolio = document.getElementById('portfolio');
      if (portfolio) {
        portfolio.addEventListener('mouseenter', function() {
          if (!autoPaused) pauseAuto();
        });
        portfolio.addEventListener('mouseleave', function() {
          /* idleTimer already scheduled by pauseAuto */
        });
      }

      /* Start auto-carousel */
      startAuto();
    }

    /* ── Swap background image from gallery thumb ── */
    function swapBackground(slideIndex, src, thumbEl) {
      var bgImg = document.getElementById('slide-bg-' + slideIndex);
      if (bgImg) {
        bgImg.style.opacity = '0';
        setTimeout(function() {
          bgImg.src = src;
          bgImg.style.opacity = '1';
        }, 200);
      }

      /* Update active thumb */
      if (thumbEl) {
        var gallery = thumbEl.closest('.portfolio-gallery');
        if (gallery) {
          gallery.querySelectorAll('.portfolio-gallery__thumb').forEach(function(t) {
            t.classList.remove('active');
          });
          thumbEl.classList.add('active');
        }
      }
    }

    /* ── Lightbox ── */
    function openLightbox(src, thumbEl) {
      var lb = document.getElementById('lightbox');
      var img = document.getElementById('lightbox-img');
      if (!lb || !img) return;
      img.src = src;
      lb.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox(e) {
      if (e && e.target !== e.currentTarget && !e.target.classList.contains('lightbox__close')) return;
      var lb = document.getElementById('lightbox');
      if (lb) {
        lb.classList.remove('active');
        document.body.style.overflow = '';
      }
    }

    /* ── Keyboard navigation ── */
    document.addEventListener('keydown', function(e) {
      var lb = document.getElementById('lightbox');

      /* Escape closes lightbox */
      if (e.key === 'Escape' && lb && lb.classList.contains('active')) {
        closeLightbox({ target: lb, currentTarget: lb });
        return;
      }

      /* Arrow keys navigate portfolio (only when lightbox is closed) */
      if (lb && lb.classList.contains('active')) return;
      if (e.key === 'ArrowRight') navigateSlide(1);
      if (e.key === 'ArrowLeft') navigateSlide(-1);
    });

    /* ── Smooth scroll for anchor links ── */
    document.querySelectorAll('a[href^="#"]').forEach(function(anchor) {
      anchor.addEventListener('click', function(e) {
        var target = document.querySelector(this.getAttribute('href'));
        if (target) {
          e.preventDefault();
          target.scrollIntoView({ behavior: 'smooth' });
        }
      });
    });
  </script>
</body>
</html>
